name: dart_vp8
description: >-
  Pure-Dart VP8 video decoder (RFC 6386). Byte-exact on all 62 official VP8
  conformance vectors. Includes IVF and WebM demuxers, no native code, no
  dart:io in the library — runs on VM, AOT and Web.
version: 0.1.0
repository: https://github.com/KellyKinyama/dart_vp8
issue_tracker: https://github.com/KellyKinyama/dart_vp8/issues
homepage: https://github.com/KellyKinyama/dart_vp8

topics:
  - vp8
  - video
  - codec
  - decoder
  - webm

environment:
  sdk: ">=3.0.0 <4.0.0"

dev_dependencies:
  test: ^1.24.0
  lints: ^3.0.0
  crypto: ^3.0.3
